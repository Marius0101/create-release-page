name: "create-release-page"
description: "Create release page"
author: "Marius Mihalcea"
branding:
  color: 'yellow'

inputs:
  token:
    description: "The github token with permisions."
    required: true
  tag_name:
    description: "The name of the tag."
    required: true
  change_log_file:
    description: "The file where the change log are writed."
    required: false
  name: 
    description: "The name of the release."
    required: false
runs:
  using: node20
  main: dist/index.js
